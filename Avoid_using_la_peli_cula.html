<!DOCTYPE html>

<head>

    <style>

            padding: 25px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        button:active {

        }

</head>
<body>
    <div class="container">
        <h1>Entrenamiento de Sinónimos: "La Película"</h1>
        <p><strong>Nivel A-Level Español:</strong> Mejora tu vocabulario para variar la expresión.</p>
        <p>Lee las pistas y escribe un sinónimo para "película" en español.</p>
        
        <div class="hint-container">
            <div class="hint-section">
                <strong>Pista en español:</strong> <span id="hint_es"></span>
            </div>
            <div class="english-hint">
                <strong>English Clue:</strong> <span id="hint_en"></span>
            </div>
            <div class="etymology">
                <strong>Origen de la palabra:</strong> <span id="hint_etym"></span>
            </div>
        </div>
        
        <input type="text" id="answer" placeholder="Escribe el sinónimo en español..." autocomplete="off" autocapitalize="off">
        
        <div>
            <button onclick="checkAnswer()">Comprobar</button>
            <button onclick="showSolution()">Mostrar Solución</button>
            <button onclick="newQuestion()">Nueva Palabra</button>
        </div>
        
        <div id="feedback"></div>
        <div id="explanation"></div>
    </div>

<script>
const synonyms = [

    {

        explanation: "Originalmente, **la cinta** (f.) era el soporte físico del celuloide. Hoy en día, se usa a menudo como sinónimo informal de película, especialmente en contextos más antiguos o nostálgicos. Siempre con el artículo **la**."
    },
    {

        hint_en: "Cinematographic work / work (emphasizes artistic value).",
        hint_etym: "From Latin 'opera' (work, effort) and Greek 'kinema' (movement).",
        explanation: "Una **obra cinematográfica** (f.) es un término más elevado y formal para referirse a una película, resaltando su calidad artística y su lugar como creación cultural. Usa el artículo **la**."
    },

        answers: ["produccion", "la produccion"],

        hint_en: "Production (the act of making a film, or the finished product).",

    },
    {
        answers: ["film", "filme", "el film", "el filme"],

        hint_es: "Un anglicismo muy común y aceptado para 'película'.",
        hint_en: "Film (direct loanword from English).",
        hint_etym: "Directly from English 'film', originally from Old English 'filmen' (membrane). 'Filme' is a Hispanicized spelling.",
        explanation: "**Film** (m.) o **filme** (m.) son anglicismos muy extendidos y aceptados en español, aunque 'película' es la palabra nativa. Son masculinos, por lo que usan el artículo **el**."
    },
    {
        answers: ["largometraje de animacion", "largometraje de animación", "el largometraje de animacion", "el largometraje de animación"],
        display: "largometraje de animación",
        hint_es: "Un tipo de largometraje hecho con dibujos o imágenes generadas por ordenador.",

        hint_etym: "Combines 'largo' (long), 'metraje' (footage), and 'animación' (animation).",

    {

    },
    {
        answers: ["exito", "el exito"],

        hint_etym: "From Latin 'exitus' (a going out, outcome).",

    },
    {
        answers: ["fracaso", "el fracaso"],
        display: "fracaso",

        hint_etym: "From Italian 'fracassare' (to smash), meaning a breaking or collapse.",

    },
    {
        answers: ["taquillazo", "el taquillazo"],

        hint_es: "Un film que ha recaudado mucho dinero en la venta de entradas.",
        hint_en: "Blockbuster (a box-office hit).",
        hint_etym: "From 'taquilla' (box office) + '-azo' (augmentative suffix).",

    {
        answers: ["churro", "bodrio", "el churro", "el bodrio"],

    },

        answers: ["metraje", "el metraje"],

        explanation: "**Metraje** (m.) se usa para hablar de la duración o las imágenes grabadas de una película. Por ejemplo, 'el metraje de este documental es de 90 minutos'. Siempre usa el artículo **el**."
    },
    {
        answers: ["largometrajes", "los largometrajes"],
        display: "largometrajes",
        hint_es: "El plural de 'largometraje'.",
        hint_en: "Feature films (plural).",
        hint_etym: "Plural of 'largometraje'.",
        explanation: "Es importante recordar el plural de 'largometraje' para hablar de varias películas de larga duración. Se usa con el artículo **los**."
    },
    {
        answers: ["realizacion", "la realizacion"],
        display: "realización",
        hint_es: "El proceso de llevar a cabo una película, desde la idea hasta el producto final.",
        hint_en: "Realization / filmmaking (the process of making a film).",
        hint_etym: "From Latin 'realizare' (to make real).",
        explanation: "La **realización** (f.) de una película se refiere a todo el trabajo creativo y técnico involucrado en su creación. También puede referirse a la obra de un director: 'la última realización de Almodóvar'. Se usa con el artículo **la**."

];

// Normalization function: remove accents, unify dashes, trim, lowercase
function normalize(str) {
    return str
        .toLowerCase()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // Remove accents
        .replace(/ñ/g, "n") // Handle ñ by converting to 'n' for normalization
        .replace(/[^a-z0-9\s]/g, "") // Remove most punctuation, keep spaces
        .replace(/\s+/g, " ") // Collapse multiple spaces
        .trim();
}

let current = {};

function newQuestion() {
    document.getElementById('answer').value = '';
    document.getElementById('feedback').innerText = '';
    document.getElementById('feedback').className = '';
    document.getElementById('explanation').innerHTML = '';
    
    current = synonyms[Math.floor(Math.random() * synonyms.length)];
    
    document.getElementById('hint_es').innerText = current.hint_es;
    document.getElementById('hint_en').innerText = current.hint_en;
    document.getElementById('hint_etym').innerText = current.hint_etym;
    
    document.getElementById('answer').focus();
}

function checkAnswer() {
    let user = normalize(document.getElementById('answer').value);
    let correct = current.answers.map(normalize);
    let feedbackEl = document.getElementById('feedback');
    let explanationEl = document.getElementById('explanation');

    if (correct.includes(user)) {
        feedbackEl.innerHTML = "✅ <strong>¡Correcto!</strong> ¡Lo has conseguido!";
        feedbackEl.className = 'correct';
        explanationEl.innerHTML = `<strong>${current.display}</strong>: ${current.explanation}`;
    } else {
        feedbackEl.innerHTML = "❌ <strong>Inténtalo de nuevo</strong>. Usa las pistas.";
        feedbackEl.className = 'incorrect';
        explanationEl.innerHTML = '';
    }
}

function showSolution() {
    let feedbackEl = document.getElementById('feedback');
    let explanationEl = document.getElementById('explanation');
    
    feedbackEl.innerHTML = `🔍 <strong>Solución</strong>: ${current.display}`;
    feedbackEl.className = '';
    explanationEl.innerHTML = `<strong>Uso</strong>: ${current.explanation}`;
}

// Initialisation
window.onload = function() {
    newQuestion();
    document.getElementById('answer').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') checkAnswer();
    });
};
</script>
</body>
</html>
