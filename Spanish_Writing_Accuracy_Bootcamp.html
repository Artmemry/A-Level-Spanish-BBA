<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spanish Writing Accuracy Bootcamp</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; max-width: 900px; background: #f7f7f7; }
        .question { margin-bottom: 15px; padding: 10px; background: #fff; border-radius: 5px; }
        .result { margin-top: 30px; border-top: 2px solid #ccc; padding-top: 20px; background: white; }
        .hidden { display: none; }
        input[type="text"] { width: 320px; padding: 5px; margin-left: 10px; }
        .correct { border: 2px solid green; background: #eaffea; }
        .incorrect { border: 2px solid red; background: #ffeaea; }
        .feedback { display: inline-block; margin-left: 10px; font-weight: bold; }
        button { padding: 10px 15px; font-size: 16px; margin-top: 20px; background: #007bff; color: white; border: none; border-radius: 5px; }
        button:hover { background: #0056b3; }
        label { display: inline-block; width: 240px; }
        .progress { text-align: center; font-size: 1.2em; margin-bottom: 20px; }
    </style>
</head>
<body>

<h1>Spanish Writing Accuracy Bootcamp</h1>
<p>Fill each box. Press Enter to check a box, or click "Check All". Immediate feedback. At the end, print or download your errors for revision.</p>
<div class="progress" id="progress">Loading questions...</div>
<div id="quiz"></div>
<button onclick="submitAnswers()">Check All</button>
<button onclick="resetQuiz()">Try Again</button>

<div id="result" class="result hidden">
    <h2>Results</h2>
    <p id="score"></p>
    <h3>Incorrect Answers</h3>
    <ul id="errors"></ul>
    <button onclick="window.print()">Print / Save as PDF</button>
</div>

<script>
    // 80 English→Spanish, 20 Spanish→English
    // Format: [English, "Spanish1/Spanish2/Spanish3"]
    const pairs = [
        ["shows", "muestra/enseña/demuestra"],
        ["represents", "representa/simboliza"],
        ["highlights", "destaca/subraya/resalta"],
        ["underlines", "subraya/destaca"],
        ["symbolises", "simboliza/representa"],
        ["reveals", "revela/desvela"],
        ["emphasises", "enfatiza/subraya/destaca"],
        ["criticises", "critica/censura"],
        ["reflects", "refleja/representa"],
        ["denounces", "denuncia/critica"],
        ["illustrates", "ilustra/ejemplifica"],
        ["describes", "describe/explica"],
        ["explores", "explora/indaga"],
        ["develops", "desarrolla/evoluciona"],
        ["uses", "utiliza/usa/emplea"],
        ["employs", "emplea/usa/utiliza"],
        ["portrays", "retrata/presenta/describe"],
        ["suggests", "sugiere/propone/insinua"],
        ["creates", "crea/genera"],
        ["evokes", "evoca/recuerda"],
        ["questions", "cuestiona/pregunta/interroga"],
        ["manipulates", "manipula/controla"],
        ["narrates", "narra/cuenta/relata"],
        ["presents", "presenta/expone"],
        ["conveys", "transmite/comunica"],
        ["generates", "genera/produce"],
        ["provokes", "provoca/genera"],
        ["brings to light", "pone de manifiesto/saca a la luz"],
        ["places emphasis on", "hace hincapié en/enfatiza"],
        ["exposes / makes evident", "pone en evidencia/expone"],
        ["shows how", "muestra cómo/enseña cómo"],
        ["demonstrates that", "demuestra que/prueba que"],
        ["one observes / it is observed", "se observa/se nota"],
        ["one can see / it can be seen", "se puede ver/es visible"],
        ["we can see", "podemos ver/observamos"],
        ["we see", "vemos/observamos"],
        ["draws attention to", "llama la atención sobre/destaca"],
        ["they have", "tienen/poseen"],
        ["they suffer", "sufren/padecen"],
        ["they experience", "experimentan/viven"],
        ["they act", "actúan/obran"],
        ["they behave", "se comportan/actúan"],
        ["they rebel", "se rebelan/se sublevan"],
        ["they oppress", "oprimen/someten"],
        ["they express", "expresan/manifiestan"],
        ["they reveal", "revelan/desvelan"],
        ["they adopt", "adoptan/asumen"],
        ["they hide", "esconden/ocultan"],
        ["they confront", "se enfrentan/afrontan"],
        ["they live", "viven/habitan"],
        ["they die", "mueren/fallecen"],
        ["they struggle", "luchan/pelean"],
        ["they reflect", "reflejan/representan"],
        ["they manipulate", "manipulan/controlan"],
        ["they try", "intentan/procuran"],
        ["they commit", "cometen/realizan"],
        ["they justify", "justifican/excusan"],
        ["they affect", "afectan/influyen"],
        ["they influence / condition", "condicionan/influyen"],
        ["they seek", "buscan/persiguen"],
        ["they control", "controlan/dirigen"],
        ["they challenge", "desafían/retán"],
        ["they use", "usan/emplean/utilizan"],
        ["they are trapped", "están atrapados/encerrados/encerradas/atrapadas"],
        ["they are victims", "son víctimas/padecen"],
        ["is manifested", "se manifiesta/se muestra"],
        ["contributes to", "contribuye a/aporta a"],
        ["gives rise to", "da lugar a/produce"],
        ["aims to", "tiene como objetivo/pretende"],
        ["focuses on", "se centra en/se enfoca en"],
        // Spanish→English (20 for variety)
        ["muestra", "shows/demonstrates"],
        ["representa", "represents/stands for"],
        ["destaca", "highlights/emphasizes"],
        ["subraya", "underlines/highlights"],
        ["simboliza", "symbolises/represents"],
        ["revela", "reveals/discloses"],
        ["enfatiza", "emphasises/stresses"],
        ["critica", "criticises/censures"],
        ["refleja", "reflects/depicts"],
        ["denuncia", "denounces/condemns"],
        ["ilustra", "illustrates/depicts"],
        ["describe", "describes/portrays"],
        ["explora", "explores/investigates"],
        ["desarrolla", "develops/unfolds"],
        ["utiliza", "uses/employs"],
        ["emplea", "employs/uses"],
        ["retrata", "portrays/depicts"],
        ["sugiere", "suggests/implies"],
        ["crea", "creates/makes"],
        ["evoca", "evokes/recalls"]
    ];

    let allQuestions = [];
    function generateQuestions() {
        allQuestions = [];
        // 80 English→Spanish, 20 Spanish→English
        let engToSpa = pairs.slice(0, 80);
        let spaToEng = pairs.slice(80, 100);
        engToSpa.forEach(pair => {
            allQuestions.push({
                prompt: pair[0],
                answers: pair[1].split("/").map(a => normalize(a)),
                direction: "toSpanish"
            });
        });
        spaToEng.forEach(pair => {
            allQuestions.push({
                prompt: pair[0],
                answers: pair[1].split("/").map(a => normalize(a)),
                direction: "toEnglish"
            });
        });
        shuffle(allQuestions);
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function normalize(text) {
        return text
            .toLowerCase()
            .replace(/[áàâä]/gi, "a")
            .replace(/[éèêë]/gi, "e")
            .replace(/[íìîï]/gi, "i")
            .replace(/[óòôö]/gi, "o")
            .replace(/[úùûü]/gi, "u")
            .replace(/[ñ]/gi, "n")
            .replace(/[ç]/gi, "c")
            .replace(/[ß]/gi, "ss")
            .replace(/[^a-z0-9]/gi, "")
            .trim();
    }

    function createQuestionElement(question, idx) {
        const dir = question.direction === "toSpanish" ? "→ Spanish" : "→ English";
        const div = document.createElement("div");
        div.className = "question";
        div.innerHTML = `
            <label>${idx+1}. ${question.prompt} <span style="color:#888;font-size:0.9em;">${dir}</span></label>
            <input type="text" id="q${idx}" 
                   onkeydown="checkAnswer(event, this, ${idx})" 
                   autocomplete="off"
                   data-answers="${question.answers.join(',')}">
            <span class="feedback" id="f${idx}"></span>
        `;
        return div;
    }

    window.checkAnswer = function(event, input, idx) {
        if (event.key === "Enter") {
            const userAnswer = normalize(input.value);
            const correctAnswers = input.dataset.answers.split(",");
            const isCorrect = correctAnswers.includes(userAnswer);

            const feedbackSpan = document.getElementById("f"+idx);
            input.classList.remove("correct", "incorrect");
            if (isCorrect) {
                input.classList.add("correct");
                feedbackSpan.textContent = "✓ Correct!";
                feedbackSpan.style.color = "green";
            } else {
                input.classList.add("incorrect");
                feedbackSpan.textContent = "✗ Try again";
                feedbackSpan.style.color = "red";
            }
            // Focus next box
            const nextInput = document.getElementById("q" + (idx + 1));
            nextInput ? nextInput.focus() : input.blur();
        }
    };

    function submitAnswers() {
        let correctCount = 0;
        const errors = [];
        allQuestions.forEach((q, idx) => {
            const input = document.getElementById("q"+idx);
            const userAnswer = normalize(input.value);
            const isCorrect = input.dataset.answers.split(",").includes(userAnswer);
            if (isCorrect) correctCount++;
            else errors.push({
                prompt: input.previousElementSibling.textContent,
                correct: input.dataset.answers.replace(/,/g, " / "),
                user: input.value
            });
        });

        document.getElementById("score").innerHTML =
            `<strong>Final Score:</strong> ${correctCount}/${allQuestions.length}`;

        const errorList = document.getElementById("errors");
        errorList.innerHTML = errors.map(e => `
            <li>
                <strong>${e.prompt}</strong><br>
                Your answer: <em>${e.user}</em><br>
                Possible answers: ${e.correct}
            </li>
        `).join("");

        document.getElementById("result").classList.remove("hidden");
    }

    function resetQuiz() {
        document.getElementById("result").classList.add("hidden");
        document.getElementById("quiz").innerHTML = "";
        generateQuestions();
        allQuestions.forEach((q, idx) => {
            document.getElementById("quiz").appendChild(createQuestionElement(q, idx));
        });
        document.getElementById("progress").textContent =
            `Total questions: ${allQuestions.length}`;
        document.getElementById("q0").focus();
    }

    // Initialize
    generateQuestions();
    allQuestions.forEach((q, idx) => {
        document.getElementById("quiz").appendChild(createQuestionElement(q, idx));
    });
    document.getElementById("progress").textContent =
        `Total questions: ${allQuestions.length}`;
    document.getElementById("q0").focus();
</script>

</body>
</html>
