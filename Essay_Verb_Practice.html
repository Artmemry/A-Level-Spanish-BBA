<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spanish-English Verb Practice (100, Mainly Into Spanish)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      max-width: 900px;
      background: #f7f7f7;
    }
    .question {
      margin-bottom: 15px;
      padding: 10px;
      background: #fff;
      border-radius: 5px;
    }
    .result {
      margin-top: 30px;
      border-top: 2px solid #ccc;
      padding-top: 20px;
      background: white;
    }
    .hidden {
      display: none;
    }
    input[type="text"] {
      width: 300px;
      padding: 5px;
      margin-left: 10px;
    }
    .correct {
      border: 2px solid green;
      background: #eaffea;
    }
    .incorrect {
      border: 2px solid red;
      background: #ffeaea;
    }
    .feedback {
      display: inline-block;
      margin-left: 10px;
      font-weight: bold;
    }
    button {
      padding: 10px 15px;
      font-size: 16px;
      margin-top: 20px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
    }
    button:hover {
      background: #0056b3;
    }
    label {
      display: inline-block;
      width: 220px;
    }
    .progress {
      text-align: center;
      font-size: 1.2em;
      margin-bottom: 20px;
    }
    .feedback em {
      color: #333;
      font-style: normal;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>Spanish-English Verb Practice (100, Mainly Into Spanish)</h1>
<p>Translate each English phrase into Spanish. Press Enter to check. Correct answer is shown after three incorrect attempts.</p>
<div class="progress" id="progress">Loading questions...</div>
<div id="quiz"></div>
<button onclick="submitAnswers()">Final Submit</button>
<button onclick="resetQuiz()">Try Again</button>

<div id="result" class="result hidden">
  <h2>Results</h2>
  <p id="score"></p>
  <h3>Incorrect Answers</h3>
  <ul id="errors"></ul>
  <button onclick="window.print()">Print / Save as PDF</button>
</div>

<script>
  const pairs = [
    ["shows", "muestra/enseña/demuestra"],
    ["represents", "representa/simboliza"],
    ["highlights", "destaca/subraya/resalta"],
    ["underlines", "subraya/destaca"],
    ["symbolises", "simboliza/representa"],
    ["reveals", "revela/desvela"],
    ["emphasises", "enfatiza/subraya/destaca"],
    ["criticises", "critica/censura"],
    ["reflects", "refleja/representa"],
    ["denounces", "denuncia/critica"],
    ["illustrates", "ilustra/ejemplifica"],
    ["describes", "describe/explica"],
    ["explores", "explora/indaga"],
    ["develops", "desarrolla/evoluciona"],
    ["uses", "utiliza/usa/emplea"],
    ["employs", "emplea/usa/utiliza"],
    ["portrays", "retrata/presenta/describe"],
    ["suggests", "sugiere/propone/insinua"],
    ["creates", "crea/genera"],
    ["evokes", "evoca/recuerda"],
    ["questions", "cuestiona/pregunta/interroga"],
    ["manipulates", "manipula/controla"],
    ["narrates", "narra/cuenta/relata"],
    ["presents", "presenta/expone"],
    ["conveys", "transmite/comunica"],
    ["generates", "genera/produce"],
    ["provokes", "provoca/genera"],
    ["brings to light", "pone de manifiesto/saca a la luz"],
    ["places emphasis on", "hace hincapié/enfatiza"],
    ["exposes / makes evident", "pone en evidencia/expone"],
    ["shows how", "muestra como/enseña como"],
    ["demonstrates that", "demuestra que/prueba que"],
    ["one observes / it is observed", "se observa/se nota"],
    ["one can see / it can be seen", "se puede ver/es visible"],
    ["we can see", "podemos ver/observamos"],
    ["we see", "vemos/observamos"],
    ["draws attention to", "llama la atencion sobre/destaca"],
    ["they have", "tienen/poseen"],
    ["they suffer", "sufren/padecen"],
    ["they experience", "experimentan/viven"],
    ["they act", "actuan/obran"],
    ["they behave", "se comportan/actuan"],
    ["they rebel", "se rebelan/se sublevan"],
    ["they oppress", "oprimen/someten"],
    ["they express", "expresan/manifiestan"],
    ["they reveal", "revelan/desvelan"],
    ["they adopt", "adoptan/asumen"],
    ["they hide", "esconden/ocultan"],
    ["they confront", "se enfrentan/afrontan"],
    ["they live", "viven/habitan"],
    ["they die", "mueren/fallecen"],
    ["they struggle", "luchan/pelean"],
    ["they reflect", "reflejan/representan"],
    ["they manipulate", "manipulan/controlan"],
    ["they try", "intentan/procuran"],
    ["they commit", "cometen/realizan"],
    ["they justify", "justifican/excusan"],
    ["they affect", "afectan/influyen"],
    ["they influence / condition", "condicionan/influyen"],
    ["they seek", "buscan/persiguen"],
    ["they control", "controlan/dirigen"],
    ["they challenge", "desafian/retan"],
    ["they use", "usan/emplean/utilizan"],
    ["they are trapped", "estan atrapados/encerrados"],
    ["they are victims", "son victimas/padecen"],
    ["is manifested", "se manifiesta/se muestra"],
    ["contributes to", "contribuye a/aporta a"],
    ["gives rise to", "da lugar a/produce"],
    ["aims to", "tiene como objetivo/pretende"],
    ["focuses on", "se centra en/se enfoca en"],
    // Spanish → English (20)
    ["muestra", "shows/demonstrates"],
    ["representa", "represents/stands for"],
    ["destaca", "highlights/emphasises"],
    ["subraya", "underlines/highlights"],
    ["simboliza", "symbolises/represents"],
    ["revela", "reveals/discloses"],
    ["enfatiza", "emphasises/stresses"],
    ["critica", "criticises/censures"],
    ["refleja", "reflects/depicts/mirrors"],
    ["denuncia", "denounces/condemns"],
    ["ilustra", "illustrates/depicts"],
    ["describe", "describes/portrays"],
    ["explora", "explores/investigates"],
    ["desarrolla", "develops/unfolds"],
    ["utiliza", "uses/employs"],
    ["retrata", "portrays/depicts"],
    ["sugiere", "suggests/implies"],
    ["crea", "creates/makes"],
    ["evoca", "evokes/recalls"],
    ["cuestiona", "questions/challenges"]
  ];

  let allQuestions = [];
  const attemptTracker = {};

  function normalize(text) {
    return text.toLowerCase()
      .replace(/[áàâä]/g, "a")
      .replace(/[éèêë]/g, "e")
      .replace(/[íìîï]/g, "i")
      .replace(/[óòôö]/g, "o")
      .replace(/[úùûü]/g, "u")
      .replace(/[ñ]/g, "n")
      .replace(/[ç]/g, "c")
      .replace(/[^a-z0-9]/g, "");
  }

  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
  }

  function generateQuestions() {
    allQuestions = [];
    let engToSpa = pairs.slice(0, 80);
    let spaToEng = pairs.slice(80);
    engToSpa.forEach(([prompt, translations]) => {
      allQuestions.push({
        prompt,
        answers: translations.split("/").map(a => normalize(a)),
        direction: "toSpanish"
      });
    });
    spaToEng.forEach(([prompt, translations]) => {
      allQuestions.push({
        prompt,
        answers: translations.split("/").map(a => normalize(a)),
        direction: "toEnglish"
      });
    });
    shuffle(allQuestions);
  }

  function createQuestionElement(question, idx) {
    const dir = question.direction === "toSpanish" ? "→ Spanish" : "→ English";
    const div = document.createElement("div");
    div.className = "question";
    div.innerHTML = `
      <label>${idx + 1}. ${question.prompt} <span style="color:#888;font-size:0.9em;">${dir}</span></label>
      <input type="text" id="q${idx}" 
             onkeydown="checkAnswer(event, this, ${idx})" 
             autocomplete="off"
             data-answers="${question.answers.join(',')}">
      <span class="feedback" id="f${idx}"></span>
    `;
    return div;
  }

  window.checkAnswer = function(event, input, idx) {
    if (event.key === "Enter") {
      const userAnswer = normalize(input.value);
      const correctAnswers = input.dataset.answers.split(",");
      const feedback = document.getElementById("f" + idx);
      input.classList.remove("correct", "incorrect");

      if (!attemptTracker[idx]) attemptTracker[idx] = 0;

      if (correctAnswers.includes(userAnswer)) {
        input.classList.add("correct");
        feedback.textContent = "✓ Correct!";
        feedback.style.color = "green";
        attemptTracker[idx] = 0;
      } else {
        attemptTracker[idx]++;
        input.classList.add("incorrect");
        if (attemptTracker[idx] >= 3) {
          const correctAns = input.dataset.answers.replace(/,/g, " / ");
          feedback.innerHTML = `✗ Incorrect after 3 attempts. <em>Answer:</em> ${correctAns}`;
          feedback.style.color = "orangered";
        } else {
          feedback.textContent = `✗ Try again (${attemptTracker[idx]}/3)`;
          feedback.style.color = "red";
        }
      }

      if (correctAnswers.includes(userAnswer)) {
        const next = document.getElementById("q" + (idx + 1));
        if (next) next.focus();
      }
    }
  };

  function submitAnswers() {
    let correctCount = 0;
    const errors = [];
    allQuestions.forEach((q, idx) => {
      const input = document.getElementById("q" + idx);
      const userAnswer = normalize(input.value);
      const correct = input.dataset.answers.split(",");
      if (correct.includes(userAnswer)) {
        correctCount++;
      } else {
        errors.push({
          prompt: input.previousElementSibling.textContent,
          user: input.value,
          correct: correct.join(" / ")
        });
      }
    });
    document.getElementById("score").innerHTML = `<strong>Final Score:</strong> ${correctCount} / ${allQuestions.length}`;
    const list = document.getElementById("errors");
    list.innerHTML = errors.map(e => `<li><strong>${e.prompt}</strong><br>Your answer: <em>${e.user}</em><br>Correct answer: ${e.correct}</li>`).join("");
    document.getElementById("result").classList.remove("hidden");
  }

  function resetQuiz() {
    document.getElementById("result").classList.add("hidden");
    document.getElementById("quiz").innerHTML = "";
    generateQuestions();
    allQuestions.forEach((q, idx) => {
      document.getElementById("quiz").appendChild(createQuestionElement(q, idx));
    });
    document.getElementById("progress").textContent = `Total questions: ${allQuestions.length}`;
    document.getElementById("q0").focus();
  }

  generateQuestions();
  allQuestions.forEach((q, idx) => document.getElementById("quiz").appendChild(createQuestionElement(q, idx)));
  document.getElementById("progress").textContent = `Total questions: ${allQuestions.length}`;
  document.getElementById("q0").focus();
</script>

</body>
</html>
